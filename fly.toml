# Fly.io configuration for Rebulb StoryAtlas.
# Deploy with: fly launch --no-deploy (first time), fly volumes create rebulb_data -s 1, fly deploy.
# Set secrets: fly secrets set WORLDFORGE_SECRET_KEY=$(openssl rand -hex 32)
#              fly secrets set SENTRY_DSN=...

app = "rebulb-storyatlas"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  APP_ENV = "production"
  WORLDFORGE_DB_PATH = "/data/worldforge.db"
  WORLDFORGE_BACKUP_DIR = "/data/backups"
  REBULB_DIST_OVERRIDE = "/app/dist"
  GUNICORN_WORKERS = "2"
  GUNICORN_THREADS = "4"
  GUNICORN_TIMEOUT = "60"
  API_WRITE_RPM = "120"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "get"
    path = "/api/health"

[[mounts]]
  source = "rebulb_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
