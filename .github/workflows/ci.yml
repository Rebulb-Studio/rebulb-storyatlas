name: CI — Lint & Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json
      - run: cd frontend && npm install
      - run: cd frontend && npm run lint

  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install flask flake8
      - run: cd backend && flake8 app.py --max-line-length=120
      - run: python -c "import ast, sys; ast.parse(open('backend/app.py').read()); print('Syntax OK')"
